name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'dev-*'
      - 'release/**'
  workflow_dispatch:

permissions:
  contents: read

# Two-tier i18n gate, split by git ref in this one file:
#
#   pr-gate       cheap, English-only-legal tier. Runs on pull requests, on pushes
#                 to non-release branches (main, dev-*), and on manual dispatch.
#                 It runs `npm test` WITHOUT I18N_RELEASE_TIER, so the release-only
#                 checks (s3_localized, copied-English rendered content, 21-locale
#                 key parity, empty-`pending`) are skipped. What it still enforces:
#                 registry-in-sync, s3_registered (every emit maps to a registered
#                 key/RULE), and placeholder parity for the translations that
#                 actually exist. An English-only PR (sparse overlay) passes here.
#
#   pr-checks     the PR tier's serialized checks (i18n freshness + coverage
#                 summary, malware gate, game/admin typecheck, env/server/client
#                 builds), split into their own job so they run in parallel with
#                 pr-gate and the PR critical path is max(tests, checks), not
#                 their sum. Same triggers as pr-gate.
#
#   release-gate  full 21-locale tier. Runs on release/** pushes and on the
#                 release-to-main PR merge result, with I18N_RELEASE_TIER=1. A merely
#                 `pending` (untranslated) key cannot survive this gate.
#
# The release tier is a superset: its `npm test` runs every PR-tier check plus the
# release-only ones, and the release-gate job also typechecks and builds
# env/server/client serially in the one job.

jobs:
  release-version-gate:
    name: Release version gate
    if: (github.event_name == 'pull_request' && github.base_ref == 'main' && startsWith(github.head_ref, 'release/')) || (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/'))
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release version surfaces
        run: npm run release:check

  # Biome formatter + linter, adopted as a forward ratchet: only files actually
  # changed by this push/PR are checked (`--changed`), so the large existing tree
  # is never retroactively reformatted, while every new diff must pass format+lint.
  # `--no-errors-on-unmatched` keeps the job green when a change touches no
  # Biome-eligible file (docs, assets, generated i18n).
  lint:
    name: Format + lint (Biome, changed files)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          # Full history so `biome --changed --since` can diff against the base ref.
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Determine base ref
        id: base
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "$BASE_REF"
            echo "ref=origin/$BASE_REF" >> "$GITHUB_OUTPUT"
          elif [ -n "$BEFORE_SHA" ] && git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
            echo "ref=$BEFORE_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "ref=HEAD~1" >> "$GITHUB_OUTPUT"
          fi

      - name: Biome check (changed files only)
        env:
          BASE_REF_RESOLVED: ${{ steps.base.outputs.ref }}
        run: npx @biomejs/biome ci --changed --since="$BASE_REF_RESOLVED" --no-errors-on-unmatched

  browser-gate:
    name: Browser regressions (Chromium)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser regressions
        run: npm run test:browser

  # The PR tier is two parallel jobs: pr-gate runs the test suite while pr-checks
  # runs the serialized checks, so the PR critical path is max(tests, checks)
  # instead of their sum. Locally `npm run gate` (scripts/gate.mjs) runs the SAME
  # combined step list serially by design; keep that script's step list in sync
  # when adding or removing a step in either job.
  pr-gate:
    name: PR gate (English-only legal)
    if: (github.event_name == 'pull_request' && (github.base_ref != 'main' || !startsWith(github.head_ref, 'release/'))) || (github.event_name == 'push' && !startsWith(github.ref, 'refs/heads/release/')) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `npm test` regenerates the i18n artifacts itself (pretest), so this job
      # needs no explicit i18n:gen step; the freshness diff lives in pr-checks.
      - name: Run tests (PR tier)
        run: npm test

  # Runs in parallel with pr-gate: same if-condition, no needs edge in either
  # direction. The default pull_request merge-ref checkout MUST be preserved
  # here: the freshness diff checks the MERGE RESULT against the base branch,
  # not just the PR head.
  pr-checks:
    name: PR checks (freshness, typecheck, builds)
    if: (github.event_name == 'pull_request' && (github.base_ref != 'main' || !startsWith(github.head_ref, 'release/'))) || (github.event_name == 'push' && !startsWith(github.ref, 'refs/heads/release/')) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate i18n artifacts
        run: npm run i18n:gen

      # Post the coverage counts of the gitignored i18n.status.summary.json (written
      # by the i18n:gen step above) to the job summary as the out-of-band audit trail.
      - name: Post i18n coverage summary
        run: node scripts/i18n_coverage_summary.mjs

      # Fast, legible fail BEFORE the long build steps if a committed generated
      # artifact drifted from source (someone changed an overlay or a catalog key but
      # forgot to regenerate). The status registry and its counts summary are both
      # gitignored; the diff covers the committed line-item locale slices AND the
      # generated TranslationKey union. The test suite also enforces this, this just
      # surfaces it sooner.
      - name: Verify committed i18n artifacts are fresh
        run: git diff --exit-code -- src/ui/i18n.resolved.generated src/admin/i18n.resolved.generated src/ui/i18n.catalog/translation_keys.generated.ts

      # Release-gate malicious-code scan. The flagger is high-recall (most hits are
      # expected dev-tooling false positives), so this uses --gate: it fails only on
      # a HIGH-severity signature that survives the path-aware priors (a wallet
      # drainer, a hardcoded-credential auth bypass, an exfil channel, a planted
      # instruction-file injection). tests/malware_scan.test.ts asserts the same
      # inside `npm test`; this just surfaces it sooner and more legibly.
      - name: Malicious-code gate
        run: npm run security:gate

      - name: Typecheck
        run: npm run check:types

      - name: Build headless environment
        run: npm run build:env

      - name: Build server
        run: npm run build:server

      - name: Build client
        run: npm run build

  release-gate:
    name: Release gate (full 21-locale)
    if: (github.event_name == 'pull_request' && github.base_ref == 'main' && startsWith(github.head_ref, 'release/')) || (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/'))
    runs-on: ubuntu-latest

    # The release tier; this single flag turns on every release-only check.
    env:
      I18N_RELEASE_TIER: '1'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # This job's checks also run locally as `npm run gate` (scripts/gate.mjs);
      # keep that script's step list in sync when adding or removing a step here.
      - name: Generate i18n artifacts
        run: npm run i18n:gen

      # Fast, legible fail BEFORE the long test/build run if a committed generated
      # artifact drifted from source (someone changed an overlay or a catalog key but
      # forgot to regenerate). The status registry and its counts summary are both
      # gitignored; the diff covers the committed line-item locale slices AND the
      # generated TranslationKey union. The test suite also enforces this, this just
      # surfaces it sooner.
      - name: Verify committed i18n artifacts are fresh
        run: git diff --exit-code -- src/ui/i18n.resolved.generated src/admin/i18n.resolved.generated src/ui/i18n.catalog/translation_keys.generated.ts

      # Post the coverage counts of the gitignored i18n.status.summary.json to the job summary as the out-of-band audit trail.
      - name: Post i18n coverage summary
        run: node scripts/i18n_coverage_summary.mjs

      # Release-gate malicious-code scan (see the PR-gate job for the rationale).
      # --gate fails only on a HIGH-severity signature surviving the path-aware
      # priors; the full agent-judged pass is the `release-malware-audit` skill.
      - name: Malicious-code gate
        run: npm run security:gate

      - name: Run tests (release tier - 21-locale + empty-pending)
        run: npm test

      - name: Typecheck
        run: npm run check:types

      - name: Build headless environment
        run: npm run build:env

      - name: Build server
        run: npm run build:server

      - name: Build client
        run: npm run build
