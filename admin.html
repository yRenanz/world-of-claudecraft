<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>World of ClaudeCraft - Admin</title>
<link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<style>
  :root {
    --gold: #ffd100;
    --gold-dim: #c8a838;
    --border: #6f5a2a;
    --panel-bg: linear-gradient(170deg, #15151f 0%, #0b0b12 60%, #08080d 100%);
    --title-font: 'Palatino Linotype', Palatino, Georgia, serif;
    --ui-font: 'Arial', 'Helvetica', sans-serif;
    --text: #e8d8a8;
    --text-dim: #9a8c66;
    --row-hover: #1d1d2a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #060609; color: var(--text); font-family: var(--ui-font); font-size: 14px; min-height: 100vh; }
  a { color: var(--gold-dim); }

  .panel {
    background: var(--panel-bg);
    border: 2px solid var(--border);
    outline: 1px solid #000;
    border-radius: 6px;
    box-shadow: 0 2px 16px #000c, inset 0 0 24px #0006, inset 0 1px 0 #ffffff14;
    padding: 14px;
  }
  .panel-title {
    font-family: var(--title-font);
    color: var(--gold);
    font-size: 16px;
    letter-spacing: 0.5px;
    text-shadow: 1px 1px 2px #000;
    border-bottom: 1px solid #463a1c;
    padding-bottom: 6px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .panel-title .hint { font-family: var(--ui-font); font-size: 11px; color: var(--text-dim); }

  /* ---------- login ---------- */
  #login { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #060609; z-index: 10; }
  #login .panel { width: 320px; }
  #login label { display: block; font-size: 12px; color: var(--text-dim); margin: 10px 0 4px; }
  #login input { width: 100%; padding: 8px; background: #11111a; border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 14px; }
  #login input:focus { outline: 1px solid var(--gold-dim); }
  #login button { width: 100%; margin-top: 14px; padding: 9px; background: linear-gradient(#4a3a14, #241c08); color: var(--gold); border: 1px solid var(--gold-dim); border-radius: 4px; font-size: 14px; font-family: var(--title-font); cursor: pointer; }
  #login button:hover { filter: brightness(1.25); }
  #login-error { color: #ff7a5e; font-size: 12px; margin-top: 10px; min-height: 15px; }

  /* ---------- layout ---------- */
  #app { display: none; max-width: 1200px; margin: 0 auto; padding: 18px 18px 60px; }
  #app.authed { display: block; }
  header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  header h1 { font-family: var(--title-font); color: var(--gold); font-size: 22px; text-shadow: 1px 1px 2px #000; }
  header .who { font-size: 12px; color: var(--text-dim); }
  header button { margin-left: 12px; padding: 4px 10px; background: #1a1410; color: #c9b27a; border: 1px solid #463a1c; border-radius: 3px; cursor: pointer; }
  header button:hover { color: #fff; border-color: var(--gold-dim); }
  #admin-tabs { display: flex; gap: 6px; margin-bottom: 18px; border-bottom: 1px solid #2a2414; }
  .admin-tab { padding: 7px 12px; background: #100d0b; color: #c9b27a; border: 1px solid #463a1c; border-bottom: none; border-radius: 4px 4px 0 0; cursor: pointer; font-family: var(--title-font); }
  .admin-tab.active { color: var(--gold); border-color: var(--gold-dim); background: #20180d; }
  .admin-page { display: none; }
  .admin-page.active { display: block; }
  section { margin-bottom: 18px; }

  /* ---------- chat filter ---------- */
  .word-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .word-chip { display: inline-flex; align-items: center; gap: 6px; padding: 3px 6px 3px 9px; background: #1b1610; border: 1px solid #463a1c; border-radius: 12px; font-size: 13px; }
  .word-del { background: none; border: none; color: #c98; cursor: pointer; font-size: 15px; line-height: 1; padding: 0 2px; }
  .word-del:hover { color: #f55; }
  .word-add { display: flex; gap: 6px; margin-top: 8px; }
  .word-add input { flex: 1; }
  .cf-config { display: flex; flex-direction: column; gap: 8px; max-width: 460px; }
  .cf-config label { display: flex; flex-direction: column; gap: 3px; font-size: 13px; color: #c9b27a; }
  .chat-mod-status { margin: 6px 0; }

  /* ---------- stat cards ---------- */
  #stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
  .stat { padding: 10px 12px; }
  .stat .v { font-family: var(--title-font); font-size: 24px; color: var(--gold); text-shadow: 1px 1px 2px #000; }
  .stat .k { font-size: 11px; color: var(--text-dim); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.6px; }

  /* ---------- tables ---------- */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #1f1a10; white-space: nowrap; }
  th { color: var(--gold-dim); font-weight: normal; font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; }
  th.sortable { cursor: pointer; }
  th.sortable:hover { color: var(--gold); }
  tbody tr:hover { background: var(--row-hover); }
  tr.clickable { cursor: pointer; }
  td.num, th.num { text-align: right; }
  .table-scroll { overflow-x: auto; }
  .usage-table { min-width: 720px; }
  .usage-section + .usage-section { margin-top: 14px; }
  .usage-section h4 { font-family: var(--title-font); color: var(--gold-dim); margin-bottom: 6px; font-size: 13px; }
  .empty { color: var(--text-dim); padding: 14px 8px; font-style: italic; }
  .badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px; border: 1px solid var(--gold-dim); color: var(--gold); }
  .badge.warn { border-color: #c98c36; color: #ffbf66; }
  .badge.bad { border-color: #b34a3a; color: #ff7a5e; }
  tr.detail-row > td { background: #0d0d14; padding: 12px 16px; white-space: normal; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .detail-grid h4 { font-family: var(--title-font); color: var(--gold-dim); margin-bottom: 6px; font-size: 13px; }
  .detail-row button {
    padding: 4px 8px;
    background: #1a1410;
    color: #c9b27a;
    border: 1px solid #463a1c;
    border-radius: 3px;
    cursor: pointer;
    font-size: 12px;
  }
  .detail-row button:hover { color: #fff; border-color: var(--gold-dim); }
  @media (max-width: 800px) { .detail-grid { grid-template-columns: 1fr; } }

  /* ---------- controls ---------- */
  .controls { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .controls input { padding: 6px 8px; background: #11111a; border: 1px solid var(--border); border-radius: 4px; color: var(--text); width: 220px; }
  .pager { display: flex; gap: 8px; align-items: center; font-size: 12px; color: var(--text-dim); margin-left: auto; }
  .pager button { padding: 3px 9px; background: #1a1410; color: #c9b27a; border: 1px solid #463a1c; border-radius: 3px; cursor: pointer; }
  .pager button:disabled { opacity: 0.35; cursor: default; }
  .pager button:not(:disabled):hover { color: #fff; border-color: var(--gold-dim); }

  /* ---------- charts ---------- */
  #charts { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  @media (max-width: 900px) { #charts { grid-template-columns: 1fr; } }
  .chart svg { width: 100%; height: auto; display: block; }
  .chart .bar { fill: #c8a838; }
  .chart .bar:hover { fill: #ffd100; }
  .chart .axis { fill: var(--text-dim); font-size: 9px; }

  /* ---------- moderation ---------- */
  #moderation-detail { margin-top: 12px; }
  .mod-report { margin-top: 12px; }
  .mod-report-meta { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 6px 12px; font-size: 12px; color: #c9b27a; }
  .mod-details { margin: 10px 0; padding: 10px; background: #0d0d14; border: 1px solid #2a2414; border-radius: 4px; white-space: pre-wrap; }
  .mod-actions, .mod-account-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 10px 0; }
  .mod-actions button, .mod-account-actions button {
    padding: 5px 10px; background: #1a1410; color: #c9b27a; border: 1px solid #463a1c; border-radius: 3px; cursor: pointer;
  }
  .mod-actions button:hover, .mod-account-actions button:hover { color: #fff; border-color: var(--gold-dim); }
  .mod-account-actions input { padding: 6px 8px; background: #11111a; border: 1px solid var(--border); border-radius: 4px; color: var(--text); }
  .account-admin-controls {
    align-items: stretch;
    padding: 10px;
    background: #090910;
    border: 1px solid #2a2414;
    border-radius: 4px;
  }
  .account-status {
    flex: 1 0 100%;
    color: #c9b27a;
    font-size: 12px;
  }
  .account-status .hint {
    color: var(--text-dim);
    margin-left: 8px;
  }
  .account-mod-reason { min-width: 300px; flex: 1 1 300px; }
  .account-custom-expiry { width: 190px; }
  #mod-reason { min-width: 300px; flex: 1 1 300px; }
  #mod-custom-expiry { width: 190px; }
  .mod-confirm { display: none; margin: 10px 0; padding: 10px; border: 1px solid #8a6f2d; border-radius: 4px; background: #171207; }
  .mod-confirm.show { display: block; }
  .mod-confirm h4 { font-family: var(--title-font); color: var(--gold); margin-bottom: 6px; }
  .mod-confirm dl { display: grid; grid-template-columns: 90px 1fr; gap: 4px 8px; font-size: 12px; }
  .mod-confirm dt { color: var(--text-dim); }
  .mod-confirm dd { color: var(--text); }
  .mod-confirm .confirm-actions { display: flex; gap: 8px; margin-top: 10px; }
  .mod-confirm button {
    min-width: 78px;
    padding: 6px 12px;
    background: linear-gradient(#2a2112, #15100b);
    color: #e8d8a8;
    border: 1px solid #6f5a2a;
    border-radius: 3px;
    cursor: pointer;
    font-size: 12px;
    line-height: 1.1;
  }
  .mod-confirm button:hover { color: #fff; border-color: var(--gold-dim); }
  .mod-confirm button:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }
  .mod-confirm button[data-confirm-moderation] {
    color: var(--gold);
    border-color: var(--gold-dim);
  }
  .mod-confirm .danger {
    border-color: #b34a3a;
    color: #ff7a5e;
  }

  /* Mobile zoom prevention: operators are users too, and the dashboard ships to
     phones/tablets. iOS Safari auto-zooms the page when a focused control renders
     below 16px (and ignores the viewport settings), so floor every focusable control
     at 16px on coarse-pointer (touch) devices. !important beats #login input's
     id-specificity (14px); pointer:coarse leaves desktop operators (fine pointer) at
     the compact 14px and is the only reliable cross-browser fix. */
  @media (pointer: coarse) {
    input,
    textarea,
    select {
      font-size: 16px !important;
    }
  }
</style>
</head>
<body>
  <div id="login">
    <form class="panel" id="login-form">
      <div class="panel-title" data-i18n="app.title">World of ClaudeCraft - Admin</div>
      <label for="login-username" data-i18n="auth.username">Username</label>
      <input id="login-username" autocomplete="username" required />
      <label for="login-password" data-i18n="auth.password">Password</label>
      <input id="login-password" type="password" autocomplete="current-password" required />
      <button type="submit" data-i18n="auth.signIn">Sign in</button>
      <div id="login-error"></div>
    </form>
  </div>

  <div id="app">
    <header>
      <h1 data-i18n="app.title">World of ClaudeCraft - Admin</h1>
      <div class="who"><span data-i18n="auth.signedInAs">signed in as</span> <span id="who-name"></span><button id="logout" data-i18n="auth.signOut">Sign out</button></div>
    </header>

    <nav id="admin-tabs">
      <button class="admin-tab active" data-admin-page="overview" data-i18n="nav.overview">Overview</button>
      <button class="admin-tab" data-admin-page="usage" data-i18n="nav.usage">Usage</button>
      <button class="admin-tab" data-admin-page="moderation" data-i18n="nav.moderation">Moderation</button>
      <button class="admin-tab" data-admin-page="chat-filter" data-i18n="nav.chatFilter">Chat Filter</button>
    </nav>

    <main id="page-overview" class="admin-page active">
      <section id="stats"></section>

      <section class="panel">
        <div class="panel-title"><span data-i18n="online.title">Players online</span> <span class="hint" data-i18n="online.refreshHint">refreshes every 5s</span></div>
        <div id="online"></div>
      </section>

      <section id="charts"></section>

      <section class="panel">
        <div class="panel-title" data-i18n="accounts.title">Accounts</div>
        <div class="controls">
          <input id="account-search" placeholder="Search username…" data-i18n-ph="accounts.searchPlaceholder" />
          <div class="pager" id="accounts-pager"></div>
        </div>
        <div id="accounts"></div>
      </section>

      <section class="panel">
        <div class="panel-title"><span data-i18n="characters.title">Characters</span> <span class="hint" data-i18n="characters.sortHint">click a column to sort</span></div>
        <div class="controls"><div class="pager" id="characters-pager"></div></div>
        <div id="characters"></div>
      </section>
    </main>

    <main id="page-usage" class="admin-page">
      <section class="panel">
        <div class="panel-title"><span data-i18n="usage.title">Provider usage</span> <span class="hint" data-i18n="usage.refreshHint">refreshes every 5s</span></div>
        <div id="usage"></div>
      </section>
    </main>

    <main id="page-moderation" class="admin-page">
      <section class="panel">
        <div class="panel-title"><span data-i18n="moderation.title">Moderation</span> <span class="hint" data-i18n="moderation.queueHint">highest open report counts first</span></div>
        <div id="moderation"></div>
        <div id="moderation-detail"></div>
      </section>
    </main>

    <main id="page-chat-filter" class="admin-page">
      <section>
        <div id="chat-filter"></div>
      </section>
    </main>
  </div>

  <script type="module" src="/src/admin/main.ts"></script>
</body>
</html>
