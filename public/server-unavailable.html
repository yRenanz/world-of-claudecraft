<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="refresh" content="30" />
  <title>World of ClaudeCraft - World Unavailable</title>
  <style>
    :root {
      color-scheme: dark;
      --gold: #d7b56d;
      --gold-soft: #f3dfaa;
      --ink: #f7efe0;
      --muted: #c4b899;
      --panel: rgba(10, 13, 20, 0.72);
      --line: rgba(215, 181, 109, 0.38);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(5, 7, 12, 0.82), rgba(5, 7, 12, 0.34) 52%, rgba(5, 7, 12, 0.86)),
        radial-gradient(circle at 50% 34%, rgba(215, 181, 109, 0.14), transparent 34%),
        #080b12 url("/loading-screen.jpg") center / cover no-repeat;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(255, 255, 255, 0.025) 50%, rgba(0, 0, 0, 0.025) 50%),
        radial-gradient(circle at 50% 88%, rgba(0, 0, 0, 0.5), transparent 42%);
      background-size: 100% 4px, auto;
      pointer-events: none;
    }

    main {
      position: relative;
      width: min(640px, 100%);
      padding: clamp(28px, 5vw, 46px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 26px 90px rgba(0, 0, 0, 0.48), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .logo {
      width: min(430px, 88%);
      height: auto;
      margin-bottom: clamp(22px, 4vw, 34px);
      filter: drop-shadow(0 10px 28px rgba(0, 0, 0, 0.64));
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--gold);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: var(--gold-soft);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(34px, 7vw, 58px);
      font-weight: 700;
      line-height: 0.98;
      text-shadow: 0 3px 18px rgba(0, 0, 0, 0.74);
    }

    p {
      margin: 18px auto 0;
      max-width: 470px;
      color: var(--muted);
      font-size: clamp(16px, 2.4vw, 18px);
      line-height: 1.58;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 28px;
      padding: 10px 14px;
      border: 1px solid rgba(215, 181, 109, 0.28);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.28);
      color: #ead7a1;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .status::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: #d7b56d;
      box-shadow: 0 0 0 5px rgba(215, 181, 109, 0.14), 0 0 18px rgba(215, 181, 109, 0.8);
    }

    @media (max-width: 560px) {
      body {
        padding: 16px;
        background-position: center;
      }

      main {
        padding: 26px 20px;
      }
    }
  </style>
</head>
<body>
  <main aria-labelledby="realm-title">
    <img class="logo" src="/worldofclaudecraft-logo.png" alt="World of ClaudeCraft" data-i18n-alt="logoAlt" />
    <p class="eyebrow" data-i18n="eyebrow">World maintenance</p>
    <h1 id="realm-title" data-i18n="heading">The world is temporarily unavailable.</h1>
    <p data-i18n="body">
      We are restarting the game service and expect Claudemoon to return shortly.
      This page will keep checking automatically.
    </p>
    <div class="status" aria-live="polite" data-i18n="status">Back soon</div>
  </main>
  <script>
    (() => {
      const copy = {
        en: {
          title: "World of ClaudeCraft - World Unavailable",
          logoAlt: "World of ClaudeCraft",
          eyebrow: "World maintenance",
          heading: "The world is temporarily unavailable.",
          body: "We are restarting the game service and expect Claudemoon to return shortly. This page will keep checking automatically.",
          status: "Back soon"
        },
        es: {
          title: "World of ClaudeCraft - Reino no disponible",
          logoAlt: "World of ClaudeCraft",
          eyebrow: "Mantenimiento del reino",
          heading: "El reino no está disponible temporalmente.",
          body: "Estamos reiniciando el servicio del juego y esperamos que Claudemoon vuelva pronto. Esta página seguirá comprobándolo automáticamente.",
          status: "Volvemos pronto"
        },
        es_ES: {
          title: "World of ClaudeCraft - Reino no disponible",
          logoAlt: "World of ClaudeCraft",
          eyebrow: "Mantenimiento del reino",
          heading: "El reino no está disponible temporalmente.",
          body: "Estamos reiniciando el servicio del juego y esperamos que Claudemoon vuelva pronto. Esta página seguirá comprobándolo automáticamente.",
          status: "Volvemos pronto"
        },
        fr_FR: {
          title: "World of ClaudeCraft - Royaume indisponible",
          logoAlt: "World of ClaudeCraft",
          eyebrow: "Maintenance du royaume",
          heading: "Le royaume est temporairement indisponible.",
          body: "Nous redémarrons le service de jeu et Claudemoon devrait revenir bientôt. Cette page continuera de vérifier automatiquement.",
          status: "Bientôt de retour"
        },
        fr_CA: {
          title: "World of ClaudeCraft - Royaume indisponible",
          logoAlt: "World of ClaudeCraft",
          eyebrow: "Maintenance du royaume",
          heading: "Le royaume est temporairement indisponible.",
          body: "Nous redémarrons le service de jeu et Claudemoon devrait revenir sous peu. Cette page continuera de vérifier automatiquement.",
          status: "De retour bientôt"
        },
        en_CA: {
          title: "World of ClaudeCraft - Realm Unavailable",
          logoAlt: "World of ClaudeCraft",
          eyebrow: "Realm maintenance",
          heading: "The realm is temporarily unavailable.",
          body: "We are restarting the game service and expect Claudemoon to return shortly. This page will keep checking automatically.",
          status: "Back soon"
        },
        it_IT: {
          title: "World of ClaudeCraft - Reame non disponibile",
          logoAlt: "World of ClaudeCraft",
          eyebrow: "Manutenzione del reame",
          heading: "Il reame è temporaneamente non disponibile.",
          body: "Stiamo riavviando il servizio di gioco e prevediamo che Claudemoon torni a breve. Questa pagina continuerà a controllare automaticamente.",
          status: "Torna presto"
        },
        de_DE: {
          title: "World of ClaudeCraft - Realm nicht verfügbar",
          logoAlt: "World of ClaudeCraft",
          eyebrow: "Realmwartung",
          heading: "Der Realm ist vorübergehend nicht verfügbar.",
          body: "Wir starten den Spieldienst neu und erwarten, dass Claudemoon bald zurückkehrt. Diese Seite prüft automatisch weiter.",
          status: "Bald zurück"
        },
        zh_CN: {
          title: "World of ClaudeCraft - 服务器不可用",
          logoAlt: "World of ClaudeCraft",
          eyebrow: "服务器维护",
          heading: "服务器暂时不可用。",
          body: "我们正在重启游戏服务，Claudemoon 应会很快恢复。此页面会自动继续检查。",
          status: "即将恢复"
        },
        zh_TW: {
          title: "World of ClaudeCraft - 伺服器不可用",
          logoAlt: "World of ClaudeCraft",
          eyebrow: "伺服器維護",
          heading: "伺服器暫時不可用。",
          body: "我們正在重新啟動遊戲服務，Claudemoon 應會很快恢復。此頁面會自動持續檢查。",
          status: "即將恢復"
        },
        ko_KR: {
          title: "World of ClaudeCraft - 렐름 이용 불가",
          logoAlt: "World of ClaudeCraft",
          eyebrow: "렐름 점검",
          heading: "렐름을 일시적으로 이용할 수 없습니다.",
          body: "게임 서비스를 재시작하고 있으며 Claudemoon은 곧 돌아올 예정입니다. 이 페이지는 자동으로 계속 확인합니다.",
          status: "곧 돌아옵니다"
        },
        ja_JP: {
          title: "World of ClaudeCraft - レルム利用不可",
          logoAlt: "World of ClaudeCraft",
          eyebrow: "レルムメンテナンス",
          heading: "レルムは一時的に利用できません。",
          body: "ゲームサービスを再起動しています。Claudemoonはまもなく戻る予定です。このページは自動的に確認を続けます。",
          status: "まもなく復帰"
        },
        pt_BR: {
          title: "World of ClaudeCraft - Reino indisponível",
          logoAlt: "World of ClaudeCraft",
          eyebrow: "Manutenção do reino",
          heading: "O reino está temporariamente indisponível.",
          body: "Estamos reiniciando o serviço do jogo e esperamos que Claudemoon volte em breve. Esta página continuará verificando automaticamente.",
          status: "Voltamos em breve"
        },
        ru_RU: {
          title: "World of ClaudeCraft - мир недоступен",
          logoAlt: "World of ClaudeCraft",
          eyebrow: "Технические работы",
          heading: "Мир временно недоступен.",
          body: "Мы перезапускаем игровой сервис и ожидаем, что Claudemoon скоро вернется. Эта страница продолжит проверку автоматически.",
          status: "Скоро вернется"
        }
      };
      const supported = Object.keys(copy);
      const normalize = (value) => value ? value.replace("-", "_") : "";
      const params = new URLSearchParams(window.location.search);
      const requested = normalize(params.get("lang"));
      const saved = normalize(localStorage.getItem("locale"));
      const browser = normalize(navigator.language);
      const language = supported.includes(requested)
        ? requested
        : supported.includes(saved)
          ? saved
          : supported.includes(browser)
            ? browser
            : browser.startsWith("es")
              ? "es"
              : "en";
      const strings = copy[language] || copy.en;
      document.documentElement.lang = language.replace("_", "-");
      document.title = strings.title;
      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const key = el.getAttribute("data-i18n");
        if (key && strings[key]) el.textContent = strings[key];
      });
      document.querySelectorAll("[data-i18n-alt]").forEach((el) => {
        const key = el.getAttribute("data-i18n-alt");
        if (key && strings[key]) el.setAttribute("alt", strings[key]);
      });
    })();
  </script>
</body>
</html>
