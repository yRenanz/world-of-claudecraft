name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'dev-*'
      - 'release/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build headless environment
        run: npm run build:env

      - name: Build server
        run: npm run build:server

      - name: Build client
        run: npm run build
